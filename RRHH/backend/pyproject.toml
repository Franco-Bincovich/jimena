[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # errores de estilo
    "F",   # variables/imports no usados
    "I",   # orden de imports
    "N",   # naming conventions
    "UP",  # upgrades a sintaxis moderna de Python
]
ignore = ["E501"]  # líneas largas — ruff format las maneja

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
